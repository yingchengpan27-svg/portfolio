name: Deploy to GitHub Pages

on:
  # 每次 push 到 main 分支触发
  push:
    branches: [main]
  # 手动触发(在 Actions 页面 Run workflow)
  workflow_dispatch:

# 防止重复部署:同一时间只跑一个 deployment
concurrency:
  group: pages
  cancel-in-progress: false

# GitHub 默认 token 权限需要写 pages 和 id-token
permissions:
  contents: read
  pages: write
  id-token: write

# 不要在 fork 上跑(避免别人 fork 后误部署)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
